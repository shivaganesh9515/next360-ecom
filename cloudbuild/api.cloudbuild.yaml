steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/api:$COMMIT_SHA",
        "-f",
        "api/Dockerfile",
        ".",
      ]
    dir: "."

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["push", "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/api:$COMMIT_SHA"]

  # Stop any pending proxy
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        # Just proxy
        wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.0/cloud-sql-proxy.linux.amd64 -O cloud-sql-proxy
        chmod +x cloud-sql-proxy
        ./cloud-sql-proxy next360-prod:asia-south1:next360-db &
        sleep 3
        npx prisma migrate deploy

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "next360-api"
      - "--image"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/api:$COMMIT_SHA"
      - "--region"
      - "asia-south1"
      - "--min-instances"
      - "1"
      - "--max-instances"
      - "20"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "2"
      - "--concurrency"
      - "80"
      - "--service-account"
      - "next360-cloudrun@$PROJECT_ID.iam.gserviceaccount.com"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,JWT_SECRET=JWT_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GCS_PROJECT_ID=GCS_PROJECT_ID:latest,ALGOLIA_APP_ID=ALGOLIA_APP_ID:latest,ALGOLIA_API_KEY=ALGOLIA_API_KEY:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest,RAZORPAY_WEBHOOK_SECRET=RAZORPAY_WEBHOOK_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,MSG91_API_KEY=MSG91_API_KEY:latest,MSG91_SENDER_ID=MSG91_SENDER_ID:latest,FRONTEND_URL=FRONTEND_URL:latest,ADMIN_URL=ADMIN_URL:latest,VENDOR_URL=VENDOR_URL:latest"

images:
  - "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/api:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
