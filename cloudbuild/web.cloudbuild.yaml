steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/web:$COMMIT_SHA",
        "-f",
        "apps/web/Dockerfile",
        ".",
      ]
    dir: "."

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      ["push", "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/web:$COMMIT_SHA"]

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "next360-web"
      - "--image"
      - "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/web:$COMMIT_SHA"
      - "--region"
      - "asia-south1"
      - "--min-instances"
      - "1"
      - "--max-instances"
      - "10"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--service-account"
      - "next360-cloudrun@$PROJECT_ID.iam.gserviceaccount.com"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "NEXT_PUBLIC_API_URL=https://api.next360.in/api"

images:
  - "asia-south1-docker.pkg.dev/$PROJECT_ID/next360/web:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
